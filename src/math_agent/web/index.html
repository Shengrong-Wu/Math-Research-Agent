<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Agent</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!-- ------------------------------------------------------------------ -->
  <!-- Header                                                              -->
  <!-- ------------------------------------------------------------------ -->
  <header id="header">
    <div class="header-left">
      <h1>Math Agent</h1>
      <span class="subtitle">Proof search with Lean 4 verification</span>
    </div>
    <div class="header-controls">
      <div class="control-group">
        <label for="provider-select">Provider</label>
        <select id="provider-select">
          <option value="anthropic">Anthropic</option>
          <option value="openai">OpenAI</option>
          <option value="deepseek">DeepSeek</option>
          <option value="gemini">Gemini</option>
        </select>
      </div>
      <div class="control-group">
        <label for="model-input">Model</label>
        <input id="model-input" type="text" placeholder="(default)" />
      </div>
      <div class="control-group">
        <label for="problem-select">Problem</label>
        <select id="problem-select">
          <option value="">Loading...</option>
        </select>
      </div>
      <button id="run-btn" class="btn-primary">Run</button>
      <span id="status-indicator" class="status-dot disconnected" title="WebSocket disconnected"></span>
    </div>
  </header>

  <!-- ------------------------------------------------------------------ -->
  <!-- Main two-panel layout                                               -->
  <!-- ------------------------------------------------------------------ -->
  <main id="main">
    <!-- Left panel: Dialogue / MEMO state -->
    <section id="panel-left" class="panel">
      <div class="panel-header">Dialogue</div>
      <div class="panel-body" id="dialogue-body">
        <!-- Problem info -->
        <div id="problem-info" class="section hidden">
          <h3>Problem</h3>
          <p id="problem-question"></p>
          <div class="problem-meta">
            <span id="problem-domain" class="badge"></span>
            <span id="problem-difficulty" class="badge"></span>
          </div>
        </div>

        <!-- Current roadmap -->
        <div id="roadmap-section" class="section hidden">
          <h3>Current Roadmap</h3>
          <ol id="roadmap-steps"></ol>
        </div>

        <!-- Proved propositions -->
        <div id="propositions-section" class="section hidden">
          <h3>Proved Propositions</h3>
          <ul id="propositions-list"></ul>
        </div>

        <!-- Previous roadmaps -->
        <div id="prev-roadmaps-section" class="section hidden">
          <h3>Previous Roadmaps</h3>
          <div id="prev-roadmaps-list"></div>
        </div>

        <!-- Placeholder when idle -->
        <div id="idle-message">
          <p>Select a problem and click <strong>Run</strong> to start.</p>
        </div>
      </div>
    </section>

    <!-- Right panel: Thinking Process stream -->
    <section id="panel-right" class="panel">
      <div class="panel-header">
        Thinking Process
        <button id="clear-log-btn" class="btn-small" title="Clear log">Clear</button>
      </div>
      <div class="panel-body" id="thinking-body">
        <div id="thinking-log"></div>
      </div>
    </section>
  </main>

  <!-- ------------------------------------------------------------------ -->
  <!-- Reconnection overlay                                                -->
  <!-- ------------------------------------------------------------------ -->
  <div id="reconnect-overlay" class="hidden">
    <div class="reconnect-box">
      <p>Connection lost. Reconnecting...</p>
      <div class="spinner"></div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
