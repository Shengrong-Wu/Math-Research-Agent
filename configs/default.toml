[hyperparameters]
n_min = 5
n_max = 15
C = 8
K = 3
lean_mode = "off"

[runtime]
backend = "codex"
model = "gpt-5.4"
effort = "low"
sandbox = "workspace-write"
approval_policy = "on-request"
persist_session = true
max_retries = 2
retry_backoff_ms = 500

[prompt_budgets]
roadmap_generation = 60000
step_work = 12000
proof_compilation = 140000
review = 24000
falsifier = 40000
near_limit_chars = 750000

[lean]
toolchain = "leanprover/lean4:v4.14.0"
mathlib = true
workspace = ".cache/lean-workspace"
