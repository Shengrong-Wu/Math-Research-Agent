# Example: different provider+model for each agent.
#
# Use a strong reasoning model for the Thinking Agent,
# a fast+cheap model for the Assistant (just summarization),
# a moderate model for the Review Agent,
# and a good code model for the CLI Agent (Lean 4).
#
# Usage:
#   math-agent --config configs/multi_provider.toml --problem harmonic_sum_not_integer

[hyperparameters]
N = 5
C = 8
K = 3

skip_lean = false

# Shared default (used only as fallback if an agent section is missing)
[provider]
name = "anthropic"
model = "claude-opus-4-0626"
temperature = 0.7

[agents.thinking]
name = "openai"
model = "o3"                    # strongest reasoning
temperature = 0.7

[agents.assistant]
name = "gemini"
model = "gemini-2.5-flash"     # fast + cheap for summarization
temperature = 0.3

[agents.review]
name = "anthropic"
model = "claude-sonnet-4-0626" # moderate strength for review
temperature = 0.5

[agents.cli]
name = "anthropic"
model = "claude-sonnet-4-0626" # good at Lean code
temperature = 0.4

[lean]
toolchain = "leanprover/lean4:v4.14.0"
mathlib = true
