# Example: different backend+model for each agent.
#
# Usage:
#   math-agent --config configs/multi_provider.toml --problem harmonic_sum_not_integer

[hyperparameters]
n_min = 5
n_max = 15
C = 8
K = 3
lean_mode = "check"

[runtime]
backend = "codex"
model = "gpt-5.4"
effort = "low"
sandbox = "workspace-write"
approval_policy = "on-request"
persist_session = true

[agents.thinking]
backend = "openai"
model = "o3"
temperature = 0.7

[agents.assistant]
backend = "gemini"
model = "gemini-2.5-flash"
temperature = 0.3

[agents.formalizer]
backend = "claude"
model = "sonnet"
temperature = 0.2

[agents.review]
backend = "anthropic"
model = "claude-sonnet-4-5"
temperature = 0.5

[agents.falsifier]
backend = "deepseek"
model = "deepseek-reasoner"

[lean]
toolchain = "leanprover/lean4:v4.14.0"
mathlib = true
workspace = ".cache/lean-workspace"
