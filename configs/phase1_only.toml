# Example: pure Phase 1 proof search with no Lean verification.
#
# Usage:
#   math-agent --config configs/phase1_only.toml --problem pid_prime_implies_maximal

[hyperparameters]
n_min = 5
n_max = 15
C = 8
K = 3
lean_mode = "off"

[runtime]
backend = "codex"
model = "gpt-5.4"
effort = "low"
sandbox = "workspace-write"
approval_policy = "on-request"
persist_session = true

[lean]
toolchain = "leanprover/lean4:v4.14.0"
mathlib = true
workspace = ".cache/lean-workspace"
